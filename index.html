<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعت و تقویم هوشمند فارسی</title>

    <link rel="stylesheet" href="style.css">
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#0f172a,#000000);
    color:white;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#00ff88;
    text-shadow:0 0 20px #00ff88;
}

.card{
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(0,255,136,.2);
    transition:.3s;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 0 35px rgba(0,255,136,.4);
}

h2{
    margin-bottom:15px;
    color:#4ade80;
}

#clock{
    font-size:70px;
    text-align:center;
    color:#00ff88;
    font-weight:bold;
    letter-spacing:4px;
    margin-top:10px;
}

#date{
    text-align:center;
    font-size:28px;
    margin-bottom:15px;
}

#stopwatch{
    text-align:center;
    font-size:55px;
    color:#38bdf8;
    margin-bottom:15px;
}

#timer{
    text-align:center;
    font-size:50px;
    color:#fbbf24;
    margin-top:15px;
}

input{
    width:120px;
    padding:12px;
    border:none;
    border-radius:12px;
    text-align:center;
    font-size:18px;
    margin:5px;
    background:#111827;
    color:white;
}

input:focus{
    outline:none;
    box-shadow:0 0 15px #00ff88;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    margin:5px;
    background:#00c853;
    color:white;
    transition:.3s;
}

button:hover{
    background:#00e676;
    transform:scale(1.05);
}

#alarmStatus,
#events,
#prayerTimes,
#weather{
    margin-top:15px;
    font-size:20px;
    line-height:1.8;
}

.calendar-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
    margin-top:10px;
}

.day{
    background:#111827;
    padding:12px;
    border-radius:10px;
    text-align:center;
}

.today{
    background:#00c853;
    color:white;
    font-weight:bold;
}

@media(max-width:768px){

    #clock{
        font-size:45px;
    }

    #date{
        font-size:20px;
    }

    #stopwatch{
        font-size:35px;
    }

    #timer{
        font-size:35px;
    }

    input{
        width:90px;
    }

    button{
        width:100%;
        margin-top:10px;
    }

}
    </style>
</head>

<body>

    <div class="container">

        <h1>⏰ ساعت و تقویم هوشمند فارسی</h1>

        <!-- ساعت -->
        <div class="card">
            <h2>ساعت</h2>
            <div id="date">----</div>
            <div id="clock">00:00:00</div>
        </div>

        <!-- هشدار -->
        <div class="card">
            <h2>هشدار</h2>

            <input type="number" id="hourInput" placeholder="ساعت">

            <input type="number" id="minuteInput" placeholder="دقیقه">

            <button onclick="setAlarm()">تنظیم هشدار</button>

            <button onclick="stopAlarm()">قطع هشدار</button>

            <div id="alarmStatus">
                هشدار تنظیم نشده
            </div>
        </div>

        <!-- کرونومتر -->
        <div class="card">

            <h2>کرونومتر</h2>

            <div id="stopwatch">
                00:00:00
            </div>

            <button onclick="startStopwatch()">شروع</button>

            <button onclick="pauseStopwatch()">توقف</button>

            <button onclick="resetStopwatch()">ریست</button>

        </div>

        <!-- تایمر -->
        <div class="card">

            <h2>تایمر</h2>

            <input type="number" id="timerMinutes" placeholder="دقیقه">

            <button onclick="startTimer()">شروع تایمر</button>

            <div id="timer">
                00:00
            </div>

        </div>

        <!-- تقویم -->
        <div class="card">

            <h2>تقویم</h2>

            <div id="calendar"></div>

        </div>

        <!-- مناسبت -->
        <div class="card">

            <h2>مناسبت امروز</h2>

            <div id="events">
                در حال بارگذاری...
            </div>

        </div>

        <!-- اوقات شرعی -->
        <div class="card">

            <h2>اوقات شرعی</h2>

            <div id="prayerTimes">
                در حال دریافت...
            </div>

        </div>

        <!-- آب و هوا -->
        <div class="card">

            <h2>آب و هوا</h2>

            <div id="weather">
                در حال دریافت...
            </div>

        </div>

    </div>

    <script src="app.js"></script>
    <script src="calendar.js"></script>
    <script src="prayer.js"></script>
    <script src="weather.js"></script>
<script>
    // ================= ساعت =================

let alarmHour = null;
let alarmMinute = null;
let ringing = false;

function updateClock() {

    const now = new Date();

    const date = new Intl.DateTimeFormat('fa-IR', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    }).format(now);

    const h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();

    const hh = String(h).padStart(2, '0');
    const mm = String(m).padStart(2, '0');
    const ss = String(s).padStart(2, '0');

    document.getElementById("clock").textContent =
        `${hh}:${mm}:${ss}`;

    document.getElementById("date").textContent =
        date;

    if (
        alarmHour !== null &&
        alarmMinute !== null &&
        h === alarmHour &&
        m === alarmMinute &&
        s === 0 &&
        !ringing
    ) {
        ringing = true;
        startAlarm();
    }

}

setInterval(updateClock, 1000);
updateClock();


// ================= هشدار =================

let audioContext;
let oscillator;

function startAlarm() {

    audioContext =
        new (window.AudioContext || window.webkitAudioContext)();

    oscillator =
        audioContext.createOscillator();

    oscillator.type = "square";
    oscillator.frequency.value = 850;

    oscillator.connect(audioContext.destination);

    oscillator.start();

    alert("⏰ زمان هشدار رسید!");

}

function stopAlarm() {

    if (oscillator) {

        oscillator.stop();
        oscillator.disconnect();

        oscillator = null;
        ringing = false;
    }

}

function setAlarm() {

    alarmHour =
        parseInt(document.getElementById("hourInput").value);

    alarmMinute =
        parseInt(document.getElementById("minuteInput").value);

    if (
        isNaN(alarmHour) ||
        isNaN(alarmMinute)
    ) {
        alert("ساعت و دقیقه را وارد کنید");
        return;
    }

    const hh =
        String(alarmHour).padStart(2, '0');

    const mm =
        String(alarmMinute).padStart(2, '0');

    document.getElementById("alarmStatus").innerHTML =
        `⏰ هشدار برای ساعت ${hh}:${mm} تنظیم شد`;

}


// ================= کرونومتر =================

let stopwatchSeconds = 0;
let stopwatchInterval = null;

function updateStopwatch() {

    stopwatchSeconds++;

    let h =
        Math.floor(stopwatchSeconds / 3600);

    let m =
        Math.floor((stopwatchSeconds % 3600) / 60);

    let s =
        stopwatchSeconds % 60;

    document.getElementById("stopwatch").innerHTML =
        `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

}

function startStopwatch() {

    if (stopwatchInterval) return;

    stopwatchInterval =
        setInterval(updateStopwatch, 1000);

}

function pauseStopwatch() {

    clearInterval(stopwatchInterval);

    stopwatchInterval = null;

}

function resetStopwatch() {

    clearInterval(stopwatchInterval);

    stopwatchInterval = null;

    stopwatchSeconds = 0;

    document.getElementById("stopwatch").innerHTML =
        "00:00:00";

}


// ================= تایمر =================

let timerInterval;

function startTimer() {

    clearInterval(timerInterval);

    let minutes =
        parseInt(
            document.getElementById("timerMinutes").value
        );

    if (isNaN(minutes) || minutes <= 0) {

        alert("تعداد دقیقه را وارد کنید");

        return;
    }

    let totalSeconds = minutes * 60;

    timerInterval = setInterval(() => {

        let m =
            Math.floor(totalSeconds / 60);

        let s =
            totalSeconds % 60;

        document.getElementById("timer").innerHTML =
            `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

        totalSeconds--;

        if (totalSeconds < 0) {

            clearInterval(timerInterval);

            document.getElementById("timer").innerHTML =
                "00:00";

            alert("⏰ زمان تایمر به پایان رسید!");

        }

    }, 1000);

}// ================= تقویم =================

function generateCalendar() {

const calendar =
    document.getElementById("calendar");

if (!calendar) return;

calendar.innerHTML = "";

const now = new Date();

const today =
    parseInt(
        new Intl.DateTimeFormat(
            "fa-IR-u-nu-latn",
            { day: "numeric" }
        ).format(now)
    );

const daysInMonth = 31;

const weekdays = [
    "ش",
    "ی",
    "د",
    "س",
    "چ",
    "پ",
    "ج"
];

const header =
    document.createElement("div");

header.className = "calendar-grid";

weekdays.forEach(day => {

    const div =
        document.createElement("div");

    div.className = "day";

    div.innerHTML =
        "<b>" + day + "</b>";

    header.appendChild(div);

});

calendar.appendChild(header);

const grid =
    document.createElement("div");

grid.className = "calendar-grid";

for (let i = 1; i <= daysInMonth; i++) {

    const div =
        document.createElement("div");

    div.className = "day";

    if (i === today) {
        div.classList.add("today");
    }

    div.textContent = i;

    grid.appendChild(div);
}

calendar.appendChild(grid);

}

generateCalendar();


// ================= مناسبت ها =================

const events = {

"1": "🎉 آغاز ماه",

"7": "📚 روز دانش",

"13": "🌿 روز طبیعت",

"22": "🏅 مناسبت نمونه",

"30": "🎈 جشن پایان ماه"

};

function showTodayEvent() {

const now = new Date();

const day =
    parseInt(
        new Intl.DateTimeFormat(
            "fa-IR-u-nu-latn",
            { day: "numeric" }
        ).format(now)
    );

const eventBox =
    document.getElementById("events");

if (!eventBox) return;

if (events[day]) {

    eventBox.innerHTML =
        events[day];

} else {

    eventBox.innerHTML =
        "📅 امروز مناسبت ثبت‌شده‌ای وجود ندارد";

}

}

showTodayEvent();
// ================= اوقات شرعی =================

// شهر پیش‌فرض
const CITY = "Tehran";
const COUNTRY = "Iran";

async function loadPrayerTimes() {

    const prayerBox =
        document.getElementById("prayerTimes");

    try {

        const response =
            await fetch(
                `https://api.aladhan.com/v1/timingsByCity?city=${CITY}&country=${COUNTRY}&method=7`
            );

        const data =
            await response.json();

        const times =
            data.data.timings;

        prayerBox.innerHTML = `
            🌅 اذان صبح: ${times.Fajr}<br>
            ☀️ طلوع: ${times.Sunrise}<br>
            🕌 اذان ظهر: ${times.Dhuhr}<br>
            🌇 غروب: ${times.Sunset}<br>
            🌙 اذان مغرب: ${times.Maghrib}<br>
            🌃 عشاء: ${times.Isha}
        `;

        checkPrayerAlarm(times);

    } catch (error) {

        prayerBox.innerHTML =
            "❌ دریافت اوقات شرعی ناموفق بود";

        console.error(error);
    }

}


// ================= هشدار اذان =================

let prayerPlayed = false;

function checkPrayerAlarm(times) {

    setInterval(() => {

        const now = new Date();

        const current =
            String(now.getHours()).padStart(2, "0") +
            ":" +
            String(now.getMinutes()).padStart(2, "0");

        const prayers = [
            {
                time: times.Fajr.substring(0, 5),
                name: "اذان صبح"
            },
            {
                time: times.Dhuhr.substring(0, 5),
                name: "اذان ظهر"
            },
            {
                time: times.Maghrib.substring(0, 5),
                name: "اذان مغرب"
            }
        ];

        prayers.forEach(prayer => {

            if (
                current === prayer.time &&
                !prayerPlayed
            ) {

                prayerPlayed = true;

                playPrayerSound();

                alert(
                    "🕌 وقت " +
                    prayer.name +
                    " فرا رسید"
                );

            }

        });

        if (
            now.getMinutes() !== 0
        ) {
            prayerPlayed = false;
        }

    }, 30000);

}


// ================= صدای اذان =================

function playPrayerSound() {

    const audio =
        new Audio("azan.mp3");

    audio.play().catch(() => {

        console.log(
            "مرورگر اجازه پخش خودکار صدا را نداد."
        );

    });

}


// ================= اجرا =================

loadPrayerTimes();

// ================= آب و هوا =================

// شهر پیش‌فرض
const city= "Tehran";

async function loadWeather() {

    const weatherBox =
        document.getElementById("weather");

    try {

        // مختصات تهران
        const lat = 35.6892;
        const lon = 51.3890;

        const response =
            await fetch(
                `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
            );

        const data =
            await response.json();

        const weather =
            data.current_weather;

        weatherBox.innerHTML = `
            🌡 دما: ${weather.temperature}°C <br>
            💨 سرعت باد: ${weather.windspeed} km/h <br>
            🧭 جهت باد: ${weather.winddirection}° <br>
            ⏰ زمان بروزرسانی: ${weather.time}
        `;

    } catch (error) {

        weatherBox.innerHTML =
            "❌ دریافت اطلاعات آب و هوا ناموفق بود";

        console.error(error);

    }

}

// اجرا
loadWeather();

if ('serviceWorker' in navigator) {

    window.addEventListener('load', () => {

        navigator.serviceWorker
            .register('./sw.js')

            .then(() => {

                console.log('Service Worker Registered');

            })

            .catch(error => {

                console.log(error);

            });

    })

}

</script>
</body>

</html>
